; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = espressif32@6.3.2
board = seeed_xiao_esp32s3
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
extra_scripts = pre:extra_script.py
upload_protocol = esptool
upload_speed = 115200
upload_flags =
	--before=no_reset
	--connect-attempts=10
; To upload: build first with 'platformio run', then hold BOOT+RESET on the board and run:
; /opt/homebrew/bin/python3 ~/.platformio/packages/tool-esptoolpy/esptool.py --chip esp32s3 --port /dev/cu.usbmodem31101 --baud 115200 --before no_reset write_flash 0x0 .pio/build/seeed_xiao_esp32s3/bootloader.bin 0x8000 .pio/build/seeed_xiao_esp32s3/partitions.bin 0x10000 .pio/build/seeed_xiao_esp32s3/firmware.bin
framework = arduino
monitor_speed = 115200
monitor_filters = default
lib_deps = 
	adafruit/Adafruit GFX Library@^1.10.6
	adafruit/Adafruit SSD1306@^2.4.3
	bodmer/TFT_eSPI@^2.5.0
build_flags = 
	-D USER_SETUP_LOADED=1
	-include /$PROJECT_DIR/include/User_Setup.h
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D DEBUG
